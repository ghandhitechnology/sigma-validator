name: Deploy SIGMA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e03fe69b9b4944935b86be2c3ae5b957
          projectName: sigma-validator
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
